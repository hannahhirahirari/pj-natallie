<script>
const e=React.createElement,{useState,useCallback,useRef}=React;
const COLORS=["#FF6B6B","#FFB347","#77DD77","#7EC8E3","#C3A6FF","#FF85A1","#98E8C1","#FFCBA4","#8899AA","#F0E68C","#DDA0DD","#5FABA1"];
const BG="#111113",SF="#1C1C1F",TX="#E8E8EC",DM="#8888A0",MX=8;
const hap=s=>{try{navigator.vibrate?.(s==="heavy"?[30,20,30]:10)}catch(e){}};
const fT=ts=>new Date(ts).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
const fD=ts=>{const d=new Date(ts),t=new Date(),y=new Date(t);y.setDate(y.getDate()-1);return d.toDateString()===t.toDateString()?"Today":d.toDateString()===y.toDateString()?"Yesterday":d.toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"})};
const ld=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch(e){return fb}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
const svs=(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}};
const lds=(k,fb)=>{try{return localStorage.getItem(k)||fb}catch(e){return fb}};

function hsl2hex(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,"0")};return"#"+f(0)+f(8)+f(4)}

function gSt(logs,ids){
  const now=Date.now(),bl=logs.filter(l=>ids.includes(l.bi));
  const ts=new Date();ts.setHours(0,0,0,0);
  const today=bl.filter(l=>l.ts>=ts.getTime()).length;
  const ws=new Date(now-7*864e5);
  const weekly=bl.filter(l=>l.ts>=ws.getTime()).length;
  const monthly=bl.filter(l=>l.ts>=now-30*864e5).length;
  const yearly=bl.filter(l=>l.ts>=now-365*864e5).length;
  const first=bl.length>0?Math.min(...bl.map(l=>l.ts)):now;
  const days=Math.max(1,Math.ceil((now-first)/864e5));
  const avg=bl.length>0?(bl.length/days).toFixed(1):"0";
  const sY=days>30;
  const since=bl.length>0?new Date(first).toLocaleDateString([],{month:"short",day:"numeric",year:days>365?"numeric":undefined}):null;
  const pw=bl.filter(l=>l.ts>=now-14*864e5&&l.ts<ws.getTime()).length;
  const trend=weekly>pw?"\u2191":weekly<pw?"\u2193":"";
  return{today,avg,weekly,monthly,yearly,sY,trend,since,total:bl.length}
}
function cIds(n){if(n.tp==="button")return n.nm?[n.id]:[];return(n.ch||[]).flatMap(cIds)}
function mkCh(pid){return Array.from({length:MX},(_,i)=>({id:pid+"_"+i,nm:"",cl:"",md:"click",tp:"button",ch:[]}))}
function gCSV(logs){
  const h="timestamp_utc,timestamp_local,event_name,path,event_type,color\n";
  return h+logs.sort((a,b)=>a.ts-b.ts).map(l=>{const d=new Date(l.ts);return[d.toISOString(),'"'+d.toLocaleString()+'"','"'+(l.en||"")+'"','"'+(l.pa||"")+'"',l.ty||"click",l.cl||""].join(",")}).join("\n")
}

// Color Picker
function CPick({value,onChange}){
  const[show,setShow]=useState(false),[hue,setHue]=useState(0),ref=useRef(null);
  const presets=["#FF6B6B","#FF85A1","#FFB347","#F0E68C","#77DD77","#98E8C1","#5FABA1","#7EC8E3","#4A90D9","#C3A6FF","#DDA0DD","#8899AA","#FF4757","#FF6348","#FFA502","#2ED573","#1E90FF","#A855F7","#EC4899","#FFCBA4","#F8B4C8","#B8E6CF","#B8D4E3","#D4C5F9"];
  const shades=[];for(let s=100;s>=30;s-=35)for(let l=85;l>=25;l-=15)shades.push(hsl2hex(hue,s,l));
  const hueBar=e("div",{ref,style:{position:"relative",height:24,borderRadius:12,cursor:"pointer",overflow:"hidden",background:"linear-gradient(to right,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000)"},
    onClick:ev=>{const r=ev.currentTarget.getBoundingClientRect();setHue(Math.round(Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width))*360))},
    onPointerDown:ev=>{const el=ev.currentTarget;const mv=e=>{const r=el.getBoundingClientRect();setHue(Math.round(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*360))};const up=()=>{window.removeEventListener("pointermove",mv);window.removeEventListener("pointerup",up)};window.addEventListener("pointermove",mv);window.addEventListener("pointerup",up)}},
    e("div",{style:{position:"absolute",top:2,left:(hue/360*100)+"%",transform:"translateX(-50%)",width:20,height:20,borderRadius:"50%",background:"white",boxShadow:"0 1px 4px rgba(0,0,0,0.4)",border:"2px solid white",pointerEvents:"none"}}));
  return e("div",null,
    e("span",{style:{fontSize:11,color:DM,marginBottom:8,display:"block",letterSpacing:"0.06em",textTransform:"uppercase"}},"Color"),
    e("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}},
      presets.slice(0,12).map(c=>e("button",{key:c,onClick:()=>{onChange(c);setShow(false)},style:{width:28,height:28,borderRadius:8,background:c,border:value===c?"2px solid white":"2px solid transparent",cursor:"pointer",transform:value===c?"scale(1.15)":"scale(1)",transition:"all 0.12s",flexShrink:0}}))),
    e("button",{onClick:()=>setShow(!show),style:{background:"none",border:"none",color:show?value:DM,fontSize:11,cursor:"pointer",padding:"4px 0",letterSpacing:"0.04em"}},show?"\u25be Custom color":"\u25b8 Custom color"),
    show&&e("div",{style:{marginTop:8,display:"flex",flexDirection:"column",gap:10}},
      hueBar,
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5}},
        shades.map((c,i)=>e("button",{key:i,onClick:()=>onChange(c),style:{width:"100%",aspectRatio:"1",borderRadius:6,background:c,border:value===c?"2px solid white":"2px solid transparent",cursor:"pointer",transform:value===c?"scale(1.1)":"scale(1)",transition:"all 0.1s"}}))),
      e("div",{style:{display:"flex",alignItems:"center",gap:10}},
        e("div",{style:{width:32,height:32,borderRadius:8,background:value,border:"1px solid #333",flexShrink:0}}),
        e("span",{style:{fontSize:11,color:DM,fontFamily:"monospace"}},value))))
}

function ClickBtn({b,onLog}){
  const[pr,setPr]=useState(false),tm=useRef(null),c=b.cl||"#2A2A2E",ok=!!b.nm;
  return e("button",{onPointerDown:()=>{if(!ok)return;setPr(true);hap();tm.current=setTimeout(()=>{hap("heavy");tm.current=null},600)},
    onPointerUp:()=>{if(!ok)return;setPr(false);if(tm.current){clearTimeout(tm.current);tm.current=null;onLog(b,"click")}},
    onPointerLeave:()=>{setPr(false);if(tm.current)clearTimeout(tm.current)},
    style:{width:"100%",aspectRatio:"1",borderRadius:20,position:"relative",border:"2px solid "+(ok?c+"40":"#333"),background:pr?c+"35":ok?c+"0D":SF,cursor:ok?"pointer":"default",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,padding:10,transition:"all 0.08s",transform:pr?"scale(0.92)":"scale(1)",boxShadow:pr?"0 0 20px "+c+"30, inset 0 2px 8px rgba(0,0,0,0.3)":"0 2px 8px rgba(0,0,0,0.2)",WebkitTapHighlightColor:"transparent",userSelect:"none",touchAction:"manipulation",overflow:"hidden"}},
    ok&&e("div",{style:{position:"absolute",inset:0,borderRadius:18,opacity:pr?0.6:0,background:"radial-gradient(circle at center,"+c+"40,transparent 70%)",transition:"opacity 0.15s",pointerEvents:"none"}}),
    e("div",{style:{width:14,height:14,borderRadius:"50%",background:ok?c:"#444",transition:"all 0.1s",transform:pr?"scale(1.3)":"scale(1)"}}),
    e("span",{style:{fontSize:11,fontWeight:600,color:ok?TX:DM,textAlign:"center",lineHeight:1.2,maxWidth:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},ok?b.nm:"Empty"))
}
function BoardTile({b,onClick}){
  const[pr,setPr]=useState(false),c=b.cl||"#2A2A2E",ok=!!b.nm,ac=(b.ch||[]).filter(x=>x.nm);
  return e("button",{onPointerDown:()=>ok&&setPr(true),onPointerUp:()=>{setPr(false);if(ok)onClick()},onPointerLeave:()=>setPr(false),
    style:{width:"100%",aspectRatio:"1",borderRadius:20,border:"2px solid "+(ok?c+"40":"#333"),background:pr?c+"20":ok?c+"08":SF,cursor:ok?"pointer":"default",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,padding:10,transition:"all 0.08s",transform:pr?"scale(0.95)":"scale(1)",boxShadow:"0 2px 8px rgba(0,0,0,0.2)",WebkitTapHighlightColor:"transparent",userSelect:"none",touchAction:"manipulation"}},
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:3}},[0,1,2,3].map(i=>e("div",{key:i,style:{width:8,height:8,borderRadius:2,background:ac[i]?ac[i].cl:"#333",opacity:ac[i]?1:0.3}}))),
    e("span",{style:{fontSize:11,fontWeight:600,color:ok?TX:DM,textAlign:"center",maxWidth:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},ok?b.nm:"Empty"),
    ok&&e("span",{style:{fontSize:9,color:DM}},ac.length+" item"+(ac.length!==1?"s":"")))
}
function NodeSetup({node,onSave,allowBoard}){
  const[nm,setNm]=useState(node.nm||""),[cl,setCl]=useState(node.cl||COLORS[0]),[tp,setTp]=useState(node.tp||"button");
  return e("div",{style:{background:SF,borderRadius:16,padding:20,display:"flex",flexDirection:"column",gap:16}},
    allowBoard&&e("div",null,
      e("span",{style:{fontSize:11,color:DM,marginBottom:8,display:"block",letterSpacing:"0.06em",textTransform:"uppercase"}},"Slot type"),
      e("div",{style:{display:"flex",gap:8}},["button","board"].map(t=>e("button",{key:t,onClick:()=>setTp(t),style:{flex:1,padding:"10px 0",borderRadius:10,border:tp===t?"2px solid "+cl:"1px solid #333",background:tp===t?cl+"15":"transparent",color:tp===t?TX:DM,fontSize:13,fontWeight:600,cursor:"pointer"}},t==="button"?"\u23fa Button":"\u25a4 Board")))),
    e("input",{type:"text",placeholder:tp==="board"?"Board name (e.g. Nathan)":"Event name (e.g. Anxiety spike)",value:nm,onChange:ev=>setNm(ev.target.value),maxLength:30,style:{background:"#0D0D0F",border:"1px solid #333",borderRadius:10,padding:"12px 14px",color:TX,fontSize:15,outline:"none",width:"100%",boxSizing:"border-box"}}),
    e(CPick,{value:cl,onChange:setCl}),
    e("div",{style:{display:"flex",gap:8}},
      e("button",{onClick:()=>onSave({...node,nm:"",cl:"",md:"click",tp:"button",ch:[]}),style:{padding:"12px 0",borderRadius:10,border:"1px solid #333",background:"transparent",color:DM,fontSize:13,cursor:"pointer",flex:1}},"Clear"),
      e("button",{disabled:!nm.trim(),onClick:()=>{const ch=tp==="board"?(node.ch&&node.ch.length?node.ch:mkCh(node.id)):[];onSave({...node,nm:nm.trim(),cl,md:"click",tp,ch})},style:{padding:"12px 0",borderRadius:10,border:"none",background:nm.trim()?cl:"#333",color:nm.trim()?"#000":DM,fontSize:13,fontWeight:700,cursor:nm.trim()?"pointer":"default",flex:2}},"Save")))
}

function PinScreen({onUnlock,isSetup}){
  const[pin,setPin]=useState("");const[confirm,setConfirm]=useState("");const[step,setStep]=useState(isSetup?"set":"enter");const[err,setErr]=useState("");
  const addDigit=d=>{setErr("");if(step==="set"){if(pin.length<4)setPin(pin+d)}else if(step==="confirm"){if(confirm.length<4){const nv=confirm+d;setConfirm(nv);if(nv.length===4){if(nv===pin){svs("nat-pin",pin);onUnlock()}else{setErr("Pins don't match");setConfirm("");setPin("");setStep("set")}}}}else{if(pin.length<4){const nv=pin+d;setPin(nv);if(nv.length===4){if(nv===lds("nat-pin","")){onUnlock()}else{setErr("Wrong pin");setPin("")}}}}};
  const del=()=>{setErr("");if(step==="confirm")setConfirm(confirm.slice(0,-1));else setPin(pin.slice(0,-1))};
  const goConfirm=()=>{if(pin.length===4){setStep("confirm");setConfirm("")}};
  const dots=step==="confirm"?confirm:pin;
  const label=step==="set"?"Set your 4-digit pin":step==="confirm"?"Confirm your pin":"Enter your pin";
  return e("div",{style:{minHeight:"100vh",background:BG,color:TX,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}},
    e("h1",{style:{fontSize:22,fontWeight:800,marginBottom:6,letterSpacing:"-0.02em"}},lds("nat-n","natallie")),
    e("p",{style:{fontSize:12,color:DM,marginBottom:30}},label),
    e("div",{style:{display:"flex",gap:14,marginBottom:8}},
      [0,1,2,3].map(i=>e("div",{key:i,style:{width:16,height:16,borderRadius:"50%",background:i<dots.length?"#4A90D9":"#2A2A2E",transition:"all 0.15s",transform:i<dots.length?"scale(1.2)":"scale(1)"}}))),
    err&&e("p",{style:{fontSize:12,color:"#FF6B6B",marginTop:8,marginBottom:-8}},err),
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginTop:24,maxWidth:240}},
      [1,2,3,4,5,6,7,8,9,null,0,"del"].map((d,i)=>d===null?e("div",{key:i}):e("button",{key:i,onClick:()=>{hap();d==="del"?del():addDigit(String(d))},
        style:{width:68,height:68,borderRadius:"50%",border:"none",background:d==="del"?"transparent":SF,color:d==="del"?DM:TX,fontSize:d==="del"?14:22,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent",userSelect:"none",touchAction:"manipulation"}},
        d==="del"?"\u232b":String(d)))),
    step==="set"&&pin.length===4&&e("button",{onClick:goConfirm,style:{marginTop:20,padding:"12px 32px",borderRadius:12,border:"none",background:"#4A90D9",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}},"Next"),
    isSetup&&e("button",{onClick:()=>{svs("nat-pin","");onUnlock()},style:{marginTop:16,background:"none",border:"none",color:DM,fontSize:12,cursor:"pointer"}},"Skip \u2014 no pin"))
}

function App(){
  const[unlocked,setUnlocked]=useState(()=>!lds("nat-pin",""));
  const hasPin=!!lds("nat-pin","");
  if(!unlocked){return e(PinScreen,{onUnlock:()=>setUnlocked(true),isSetup:!hasPin})}
  const[slots,_setSlots]=useState(()=>ld("nat-s",mkCh("r")));
  const[logs,_setLogs]=useState(()=>ld("nat-l",[]));
  const[nav,setNav]=useState([]);
  const[mode,setMode]=useState("click");
  const[ed,setEd]=useState(null);
  const[vl,setVl]=useState(null);
  const[fl,setFl]=useState(null);
  const[appNm,setAppNm]=useState(()=>lds("nat-n","natallie"));
  const[edNm,setEdNm]=useState(false);
  const flR=useRef(null);

  const setSlots=v=>{_setSlots(v);sv("nat-s",v)};
  const setLogs=fn=>{_setLogs(p=>{const n=typeof fn==="function"?fn(p):fn;sv("nat-l",n);return n})};
  const saveAppNm=n=>{const v=n.trim()||"natallie";setAppNm(v);svs("nat-n",v)};

  const cur=nav.length===0?null:nav[nav.length-1];
  const chi=cur?(cur.ch||[]):slots;
  const act=chi.filter(n=>n.nm);
  const upN=(nodes,nid,fn)=>nodes.map(n=>n.id===nid?fn(n):n.ch&&n.ch.length?{...n,ch:upN(n.ch,nid,fn)}:n);
  const refN=(ns,stk)=>{const r=[];let c=ns;for(const f of stk){const fd=c.find(n=>n.id===f.id);if(fd){r.push(fd);c=fd.ch||[]}else break}return r};
  const gc=n=>n<=2?"repeat("+n+",1fr)":n<=4?"repeat(2,1fr)":n<=6?"repeat(3,1fr)":"repeat(4,1fr)";
  const ps={minHeight:"100vh",background:BG,color:TX,fontFamily:"'SF Pro Display','Helvetica Neue',-apple-system,sans-serif"};
  const bb=fn=>e("button",{onClick:fn,style:{background:"none",border:"none",color:DM,fontSize:20,cursor:"pointer",padding:"4px 8px"}},"\u2190");

  const doLog=useCallback((button,type)=>{
    const path=[...nav.map(b=>b.nm),button.nm].join(" \u203a ");
    setLogs(p=>[{id:Date.now()+Math.random(),bi:button.id,en:button.nm,pa:path,cl:button.cl,ty:type,ts:Date.now()},...p]);
    setFl(button.cl);if(flR.current)clearTimeout(flR.current);flR.current=setTimeout(()=>setFl(null),200);
  },[nav]);

  const doExp=ids=>{
    const f=ids?logs.filter(l=>ids.includes(l.bi)):logs;
    if(f.length===0)return;
    const csv=gCSV(f);
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="natallie-export-"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const saveNode=updated=>{
    if(nav.length===0){setSlots(slots.map(n=>n.id===updated.id?updated:n))}
    else{const bid=nav[nav.length-1].id;const ns=upN(slots,bid,board=>({...board,ch:board.ch.map(n=>n.id===updated.id?updated:n)}));setSlots(ns);setNav(refN(ns,nav))}
    setEd(null);
  };
  const openB=board=>setNav(p=>[...p,board]);
  const goBack=()=>setNav(p=>p.slice(0,-1));
  const Flash=()=>fl?e("div",{style:{position:"fixed",inset:0,background:fl,opacity:0.06,pointerEvents:"none",zIndex:100}}):null;
  const Pill=({btn})=>{const ids=cIds(btn),st=gSt(logs,ids);return e("button",{onClick:()=>setVl(btn),style:{background:btn.cl+"15",border:"1px solid "+btn.cl+"30",borderRadius:20,padding:"6px 12px",color:btn.cl,fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5}},e("span",{style:{width:6,height:6,borderRadius:btn.tp==="board"?2:"50%",background:btn.cl}}),btn.nm+" \xb7 "+st.total+(st.trend?" "+st.trend:""))};

  // VIEW LOGS
  if(vl){
    const ids=cIds(vl),bl=logs.filter(l=>ids.includes(l.bi));
    const gr={};bl.forEach(l=>{const k=fD(l.ts);if(!gr[k])gr[k]=[];gr[k].push(l)});
    const s=gSt(logs,ids);
    const cols=[{l:"today",v:s.today},{l:"daily avg",v:s.avg},{l:"this week",v:s.weekly},{l:"this month",v:s.monthly}];
    if(s.sY)cols.push({l:"this year",v:s.yearly});
    return e("div",{style:ps},
      e("div",{style:{padding:"20px 20px 12px",display:"flex",alignItems:"center",gap:12}},
        bb(()=>setVl(null)),
        e("div",{style:{flex:1}},
          e("div",{style:{display:"flex",alignItems:"center",gap:8}},
            e("div",{style:{width:10,height:10,borderRadius:vl.tp==="board"?3:"50%",background:vl.cl}}),
            e("h1",{style:{fontSize:20,fontWeight:800,margin:0}},vl.nm)),
          e("p",{style:{fontSize:11,color:DM,margin:"2px 0 0"}},bl.length+" event"+(bl.length!==1?"s":"")+(vl.tp==="board"?" \xb7 "+ids.length+" btn"+(ids.length!==1?"s":""):""))),
        bl.length>0&&e("button",{onClick:()=>doExp(ids),style:{background:vl.cl+"20",border:"1px solid "+vl.cl+"40",borderRadius:8,padding:"6px 12px",color:vl.cl,fontSize:11,fontWeight:700,cursor:"pointer"}},"\u2193 CSV")),
      e("div",{style:{padding:"0 20px 30px"}},
        bl.length>0&&e("div",{style:{padding:"8px 0 16px",borderBottom:"1px solid #1F1F23",marginBottom:4}},
          e("div",{style:{display:"grid",gridTemplateColumns:"repeat("+cols.length+",1fr)",gap:8}},cols.map(c=>e("div",{key:c.l,style:{textAlign:"center"}},e("div",{style:{fontSize:20,fontWeight:800,color:vl.cl,lineHeight:1.2}},c.v),e("div",{style:{fontSize:9,color:DM,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:3}},c.l)))),
          s.since&&e("div",{style:{textAlign:"center",marginTop:10,fontSize:10,color:DM}},"tracking since "+s.since)),
        bl.length===0?e("div",{style:{textAlign:"center",padding:"60px 0",color:DM}},"No events logged yet"):
        Object.entries(gr).map(([date,entries])=>e("div",{key:date},
          e("div",{style:{fontSize:11,fontWeight:700,color:DM,padding:"16px 0 8px",letterSpacing:"0.1em",textTransform:"uppercase"}},date),
          entries.map(log=>e("div",{key:log.id,style:{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:"1px solid #1F1F23"}},
            e("div",{style:{width:6,height:6,borderRadius:"50%",background:log.cl,flexShrink:0}}),
            e("div",{style:{flex:1}},e("div",{style:{fontSize:14,color:TX}},fT(log.ts)),e("div",{style:{fontSize:11,color:DM,marginTop:1}},log.pa||log.en)),
            e("button",{onClick:()=>setLogs(p=>p.filter(l=>l.id!==log.id)),style:{background:"none",border:"none",color:"#555",fontSize:18,cursor:"pointer",padding:"4px 8px"}},"\xd7")))))))
